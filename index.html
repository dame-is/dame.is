<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Boot recovery for the stale-shell white-screen.

      Every deploy content-hashes this page's entry module
      (/assets/index-<hash>.js) and deletes the previous hash. If a visitor is
      ever handed an HTML shell from an older build — a CDN- or edge-cached copy
      that outlived the deploy — the module it references is gone. Vercel serves
      that 404 as text/plain, the browser refuses to run it as a module
      ("blocked because of a disallowed MIME type"), and the page stays blank
      forever: React never mounts, so the in-app auto-updater
      (src/hooks/useAutoUpdate.js) never gets a chance to help.

      This inline script runs regardless of the module. It catches the failed
      load and reloads once against a cache-busted URL — a fresh key misses any
      cached shell and re-fetches HTML that points at the current build. The
      "_r" param in the URL is itself the loop guard (present ⇒ we already
      retried), so a genuine outage can never loop and no storage is needed. A
      successful boot strips the param (see src/main.jsx).

      Shells that PREDATE this script can't heal themselves — for those,
      api/asset-recovery.js serves the same guarded reload from the missing
      asset's own URL (wired in vercel.json). The two nets share the "_r"
      protocol, so together they retry at most once.
    -->
    <script>
      (function () {
        window.addEventListener(
          'error',
          function (e) {
            // Only the entry module failing to load blanks the page. Ignore
            // everything else (images, fonts, inline scripts, CSS links).
            var t = e && e.target;
            if (!t || t.tagName !== 'SCRIPT') return;
            if (String(t.src || '').indexOf('/assets/') === -1) return;
            var u = new URL(window.location.href);
            if (u.searchParams.has('_r')) return; // already retried — don't loop
            u.searchParams.set('_r', Date.now().toString(36));
            window.location.replace(u.toString());
          },
          true, // capture: resource load errors don't bubble
        );
      })();
    </script>
    <!-- Icons rotate hourly to match Dame's sun-tracking avatar (see api/favicon.js).
         The larger sizes + web manifest (api/manifest.js) make the site installable
         as a PWA with the current-hour sky avatar as its app icon. -->
    <link rel="icon" type="image/png" href="/api/favicon" />
    <link rel="apple-touch-icon" sizes="192x192" href="/api/favicon?size=192" />
    <link rel="manifest" href="/api/manifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#e3d8ba" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#13180f" media="(prefers-color-scheme: dark)" />
    <!-- iOS / Android standalone install hints -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="dame.is" />
    <title>dame.is</title>
    <meta name="description" content="An atmospheric website by dame, built atop the AT Protocol." />
    <!-- Blog feed for readers/aggregators — /feed.xml is emitted at build time. -->
    <link rel="alternate" type="application/atom+xml" title="dame.is blog" href="/feed.xml" />

    <!--
      Baseline Open Graph / Twitter tags — the fallback card for any route.
      middleware.js overrides og:title/description/image per page for the main
      surfaces so crawlers see page-specific dynamic cards.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="dame.is" />
    <meta property="og:url" content="https://dame.is/" />
    <meta property="og:title" content="dame.is" />
    <meta property="og:description" content="An atmospheric website by dame, built atop the AT Protocol." />
    <meta property="og:image" content="https://dame.is/api/og" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="dame.is — an atmospheric website built atop the AT Protocol." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="dame.is" />
    <meta name="twitter:description" content="An atmospheric website by dame, built atop the AT Protocol." />
    <meta name="twitter:image" content="https://dame.is/api/og" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Only the two families the theme actually renders are requested: Crimson
      Pro (the whole serif voice) and IBM Plex Mono (the ledger/code accent).
      Source Serif 4, Atkinson Hyperlegible and Inter appear in theme.css only
      as fallback stacks — no role resolves to them — so their webfonts are
      never used and aren't loaded here.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300..900;1,300..900&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
